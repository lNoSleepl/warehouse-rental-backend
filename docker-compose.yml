version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: warehouse_db
    restart: always
    environment:
      POSTGRES_DB: warehouse_rental
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: raf
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: warehouse_backend
    restart: always
    ports:
      - '3000:3000'
    environment:
      DB_HOST: postgres      
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: raf      
      DB_NAME: warehouse_rental
      JWT_SECRET: your_secret_here
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: